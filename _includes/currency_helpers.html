<script>
(function () {
  function getCurrencyCode(locale) {
    const country = (locale || 'en-US').split('-')[1] || 'US';
    const currencyMap = { MY: 'MYR', US: 'USD', SG: 'SGD', JP: 'JPY', GB: 'GBP' };
    return currencyMap[country] || 'USD';
  }

  function getFormatter(locale) {
    const currency = getCurrencyCode(locale);
    return new Intl.NumberFormat(locale || 'en-US', {
      style: 'currency',
      currency,
      minimumFractionDigits: 2
    });
  }

  /** Compact currency display (no space between symbol and amount). */
  function formatPrice(prices) {
    const locale = localStorage.getItem('preferredLocale') || 'en-US';
    const currency = getCurrencyCode(locale);
    const formatter = getFormatter(locale);
    const price = prices[currency] || prices.USD || 0;
    const parts = formatter.formatToParts(price);
    let result = '';
    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      if (part.type === 'currency') {
        result += part.value;
        if (i + 1 < parts.length && parts[i + 1].type === 'literal' && parts[i + 1].value === ' ') {
          i++;
        }
      } else if (part.type !== 'literal') {
        result += part.value;
      }
    }
    return result;
  }

  window.getCurrencyCode = getCurrencyCode;
  window.getFormatter = getFormatter;
  window.formatPrice = formatPrice;
})();
</script>
