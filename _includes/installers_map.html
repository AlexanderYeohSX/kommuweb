<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""
/>
<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>

<script>
(function () {
  const MALAYSIA_BOUNDS = L.latLngBounds(
    [0.85, 99.64],
    [7.36, 119.27]
  );

  const API_URL = {{ site.installers_api_url | jsonify }};
  const DEV_SAMPLE = {{ site.data.installers_sample | jsonify }};
  const INSTALLER_PIN_URL = {{ '/assets/img/installer-pin.svg' | relative_url | jsonify }};

  function installerPinIcon() {
    const mobile = isMobileMap();
    const w = mobile ? 18 : 26;
    const h = mobile ? 24 : 32;
    return L.icon({
      iconUrl: INSTALLER_PIN_URL,
      iconSize: [w, h],
      iconAnchor: [w / 2, h],
      popupAnchor: [0, -(h - 3)],
      className: 'installer-leaflet-pin'
    });
  }

  function updateAllMarkerIcons() {
    const icon = installerPinIcon();
    Object.keys(markersById).forEach(function (id) {
      markersById[id].setIcon(icon);
    });
  }

  const statusEl = document.getElementById('installers-status');
  const errorEl = document.getElementById('installers-error');
  const contentEl = document.getElementById('installers-content');
  const emptyEl = document.getElementById('installers-empty');
  const tableBody = document.getElementById('installer-table-body');

  let map = null;
  let markersById = {};
  let allMarkerLatLngs = [];
  let resetTimeout = null;
  let tableListenersBound = false;
  let pendingFocusId = null;

  function isMobileMap() {
    return window.matchMedia('(max-width: 900px)').matches;
  }

  function overviewBounds() {
    if (!allMarkerLatLngs.length) return MALAYSIA_BOUNDS;

    const bounds = L.latLngBounds(allMarkerLatLngs);
    const center = bounds.getCenter();
    const padFactor = isMobileMap() ? 0.18 : 0.25;
    let expanded = bounds.pad(padFactor);

    const minSpan = isMobileMap() ? 2.8 : 3.5;
    const ne = expanded.getNorthEast();
    const sw = expanded.getSouthWest();
    const latSpan = ne.lat - sw.lat;
    const lngSpan = ne.lng - sw.lng;

    if (latSpan < minSpan || lngSpan < minSpan) {
      const halfLat = Math.max(latSpan, minSpan) / 2;
      const halfLng = Math.max(lngSpan, minSpan) / 2;
      expanded = L.latLngBounds(
        [center.lat - halfLat, center.lng - halfLng],
        [center.lat + halfLat, center.lng + halfLng]
      );
    }

    return expanded;
  }

  function overviewFitOptions(animate) {
    return {
      padding: isMobileMap() ? [24, 16] : [48, 48],
      // maxZoom = ceiling only; won't zoom in if fitBounds computes a lower level
      maxZoom: isMobileMap() ? 6 : 8,
      animate: !!animate
    };
  }

  function fitAllMarkers(animate) {
    if (!map) return;
    map.invalidateSize();
    const bounds = overviewBounds();
    const opts = overviewFitOptions(animate);
    map.fitBounds(bounds, opts);

    if (!isMobileMap() || !allMarkerLatLngs.length) return;

    const floorZoom = 5;
    if (map.getZoom() >= floorZoom) return;

    const markerBounds = L.latLngBounds(allMarkerLatLngs).pad(0.08);
    const center = markerBounds.getCenter();
    map.setView(center, floorZoom, { animate: false });

    if (!map.getBounds().contains(markerBounds)) {
      map.fitBounds(bounds, opts);
      return;
    }

    if (opts.animate) {
      map.setView(center, floorZoom, { animate: true });
    }
  }

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function multilineHtml(str) {
    return escapeHtml(String(str || '').replace(/\\n/g, '\n')).replace(/\r?\n/g, '<br>');
  }

  function plainText(str) {
    return String(str || '').replace(/\\n/g, '\n').replace(/\r?\n/g, ' ').trim();
  }

  function listPhoneHtml(contact) {
    const c = String(contact || '').trim();
    if (!c) return '';
    const spaced = c.replace(/(\d{3})(?=\d)/g, '$1\u200b');
    return '<span class="installer-list-phone" x-apple-data-detectors="none">' + escapeHtml(spaced) + '</span>';
  }

  function phoneHtml(contact) {
    const c = String(contact || '').trim();
    if (!c) return '';
    let digits = c.replace(/[^\d]/g, '');
    if (digits.length < 8) return escapeHtml(c);
    if (digits.startsWith('0')) {
      digits = '60' + digits.slice(1);
    } else if (!digits.startsWith('60')) {
      digits = '60' + digits;
    }
    return (
      '<a class="installer-popup-phone" href="https://wa.me/' + escapeHtml(digits) + '" target="_blank" rel="noopener noreferrer">' +
      '<i class="fab fa-whatsapp installer-popup-wa-icon" aria-hidden="true"></i>' +
      '<span>' + escapeHtml(c) + '</span>' +
      '</a>'
    );
  }

  function popupHtml(installer) {
    const showInstaller =
      installer.installer_name &&
      installer.shop_name &&
      installer.installer_name !== installer.shop_name &&
      installer.installer_name !== installer.name;

    return (
      '<div class="installer-popup-name">' + multilineHtml(installer.name) + '</div>' +
      (showInstaller ? '<div class="installer-popup-person">' + escapeHtml(installer.installer_name) + '</div>' : '') +
      (installer.contact ? '<div>' + phoneHtml(installer.contact) + '</div>' : '') +
      (installer.address ? '<div class="installer-popup-muted">' + escapeHtml(installer.address) + '</div>' : '')
    );
  }

  /** Slight offset when multiple installers share the same coordinates so pins stay clickable. */
  function markerPositions(installers) {
    const groups = {};
    installers.forEach(function (installer, index) {
      const lat = parseFloat(installer.lat);
      const lng = parseFloat(installer.lng);
      if (!isFinite(lat) || !isFinite(lng)) return;
      const key = lat.toFixed(4) + ',' + lng.toFixed(4);
      if (!groups[key]) groups[key] = [];
      groups[key].push({ installer: installer, index: index });
    });

    const positions = {};
    Object.keys(groups).forEach(function (key) {
      const group = groups[key];
      if (group.length === 1) {
        positions[group[0].installer.id] = [
          parseFloat(group[0].installer.lat),
          parseFloat(group[0].installer.lng)
        ];
        return;
      }
      const baseLat = parseFloat(group[0].installer.lat);
      const baseLng = parseFloat(group[0].installer.lng);
      const radius = isMobileMap() ? 0.022 : 0.018;
      group.forEach(function (item, i) {
        const angle = (2 * Math.PI * i) / group.length;
        positions[item.installer.id] = [
          baseLat + radius * Math.cos(angle),
          baseLng + radius * Math.sin(angle)
        ];
      });
    });
    return positions;
  }

  function sortInstallers(list) {
    return list.slice().sort(function (a, b) {
      const s = String(a.state).localeCompare(String(b.state));
      if (s !== 0) return s;
      return String(a.name).localeCompare(String(b.name));
    });
  }

  function useDevSample() {
    const params = new URLSearchParams(window.location.search);
    return params.get('dev') === '1' || !API_URL;
  }

  async function fetchInstallers() {
    if (useDevSample()) {
      return sortInstallers(DEV_SAMPLE || []);
    }

    const url = API_URL + (API_URL.indexOf('?') >= 0 ? '&' : '?') + 't=' + Date.now();
    const res = await fetch(url, { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const list = Array.isArray(data) ? data : (data.installers || []);
    return sortInstallers(list);
  }

  function renderTable(installers) {
    tableBody.innerHTML = '';
    installers.forEach(function (installer) {
      const tr = document.createElement('tr');
      tr.dataset.installerId = installer.id;
      tr.setAttribute('tabindex', '0');
      tr.setAttribute('role', 'button');
      tr.setAttribute('aria-label', 'Show ' + plainText(installer.name) + ' on map');

      const stateTd = document.createElement('td');
      stateTd.className = 'px-4 py-4 align-top text-gray-300';
      stateTd.textContent = installer.state;

      const infoTd = document.createElement('td');
      infoTd.className = 'px-4 py-4 align-top';
      infoTd.innerHTML =
        '<div class="font-semibold text-white mb-1 installer-list-name">' + multilineHtml(installer.name) + '</div>' +
        (installer.contact ? '<div class="text-gray-300 mb-1">' + listPhoneHtml(installer.contact) + '</div>' : '') +
        (installer.address ? '<div class="text-gray-500 text-sm">' + escapeHtml(installer.address) + '</div>' : '');

      tr.appendChild(stateTd);
      tr.appendChild(infoTd);

      tableBody.appendChild(tr);
    });

    if (!tableListenersBound) {
      tableListenersBound = true;
      tableBody.addEventListener('click', function (e) {
        const tr = e.target.closest('tr[data-installer-id]');
        if (!tr) return;
        focusInstaller(tr.dataset.installerId, { fromTable: true });
      });

      tableBody.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const tr = e.target.closest('tr[data-installer-id]');
        if (!tr) return;
        e.preventDefault();
        focusInstaller(tr.dataset.installerId, { fromTable: true });
      });
    }
  }

  function initMap(installers) {
    if (map) {
      map.remove();
      map = null;
      markersById = {};
    }

    map = L.map('installer-map', {
      maxBounds: MALAYSIA_BOUNDS.pad(0.08),
      maxBoundsViscosity: 1.0,
      minZoom: isMobileMap() ? 1 : 6,
      zoomControl: false,
      attributionControl: false,
      dragging: !isMobileMap(),
      tap: !isMobileMap(),
      scrollWheelZoom: false,
      doubleClickZoom: false,
      touchZoom: false,
      boxZoom: false,
      keyboard: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    const positions = markerPositions(installers);
    const latLngs = [];
    allMarkerLatLngs = [];

    installers.forEach(function (installer) {
      const ll = positions[installer.id];
      if (!ll) return;

      latLngs.push(ll);
      allMarkerLatLngs.push(ll);

      const marker = L.marker(ll, { icon: installerPinIcon() }).addTo(map);
      marker.bindPopup(popupHtml(installer), { autoPan: false });
      marker.on('click', function (e) {
        L.DomEvent.stopPropagation(e);
        focusInstaller(installer.id);
      });
      markersById[installer.id] = marker;
    });

    fitAllMarkers(false);

    map.on('click', function () {
      if (map._popup && map._popup.isOpen()) {
        map.closePopup();
      } else {
        resetMapView();
      }
    });

    map.on('popupopen', function () {
      cancelPendingReset();
    });

    map.on('popupclose', function () {
      scheduleResetIfNoPopup();
    });

    setTimeout(function () {
      fitAllMarkers(false);
    }, isMobileMap() ? 300 : 100);
  }

  window.addEventListener('resize', function () {
    if (!map) return;
    if (isMobileMap()) {
      map.dragging.disable();
      map.tap && map.tap.disable();
    } else {
      map.dragging.enable();
      map.tap && map.tap.enable();
    }
    updateAllMarkerIcons();
    if (map._popup && map._popup.isOpen()) return;
    fitAllMarkers(false);
  });

  function cancelPendingReset() {
    if (resetTimeout) {
      clearTimeout(resetTimeout);
      resetTimeout = null;
    }
  }

  function scheduleResetIfNoPopup() {
    if (pendingFocusId) return;
    cancelPendingReset();
    resetTimeout = setTimeout(function () {
      resetTimeout = null;
      if (pendingFocusId) return;
      if (map && map._popup && map._popup.isOpen()) return;
      resetMapView();
    }, 50);
  }

  function highlightTableRow(id) {
    tableBody.querySelectorAll('tr').forEach(function (tr) {
      tr.classList.toggle('installer-row-active', tr.dataset.installerId === id);
    });
  }

  function resetMapView() {
    if (!map) return;
    tableBody.querySelectorAll('tr').forEach(function (tr) {
      tr.classList.remove('installer-row-active');
    });
    fitAllMarkers(true);
  }

  function focusZoom() {
    return isMobileMap() ? 10 : 11;
  }

  function centerOnMarker(marker, id) {
    pendingFocusId = id;
    cancelPendingReset();
    map.invalidateSize();

    const latLng = marker.getLatLng();
    const zoom = focusZoom();

    if (map._popup && map._popup.isOpen()) {
      map.closePopup();
    }

    map.flyTo(latLng, zoom, { duration: 0.45 });
    map.once('moveend', function () {
      if (pendingFocusId !== id) return;
      marker.openPopup();
      pendingFocusId = null;
    });
  }

  function focusInstaller(id, opts) {
    opts = opts || {};
    const marker = markersById[id];
    if (!marker || !map) return;
    highlightTableRow(id);

    if (opts.fromTable && window.matchMedia('(max-width: 900px)').matches) {
      const mapEl = document.getElementById('installer-map');
      if (mapEl) {
        mapEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      setTimeout(function () { centerOnMarker(marker, id); }, 350);
    } else {
      centerOnMarker(marker, id);
    }
  }

  function showLoading(msg) {
    statusEl.textContent = msg || 'Loading installers…';
    statusEl.classList.remove('hidden');
    errorEl.classList.add('hidden');
    contentEl.classList.add('hidden');
  }

  function showError() {
    statusEl.classList.add('hidden');
    errorEl.classList.remove('hidden');
    contentEl.classList.add('hidden');
  }

  function showContent(installers) {
    statusEl.classList.add('hidden');
    errorEl.classList.add('hidden');
    contentEl.classList.remove('hidden');

    if (!installers.length) {
      emptyEl.classList.remove('hidden');
      initMap([]);
      return;
    }

    emptyEl.classList.add('hidden');
    renderTable(installers);
    initMap(installers);

    if (useDevSample()) {
      statusEl.classList.remove('hidden');
      statusEl.textContent = 'Showing sample installers (configure installers_api_url for live data).';
    }
  }

  async function boot() {
    showLoading();
    try {
      const installers = await fetchInstallers();
      showContent(installers);
    } catch (err) {
      console.error('Installers load failed:', err);
      showError();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
